name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript + Vite)
        run: npm run build

      - name: Run tests
        run: |
          npm test
          npx tsx src/tests/collab-pathological-repeat-guard.test.ts
          npx tsx src/tests/document-title-auto-derive.test.ts
          npx tsx src/tests/agent-edit-v2-ghost-lease-regression.test.ts
          npx tsx src/tests/collab-soft-refresh-preserves-scroll.test.ts
          npx tsx src/tests/agent-invite-token-from-share-client.test.ts
          npx tsx src/tests/agent-invite-message-builder.test.ts
          npx tsx src/tests/agent-invite-message-response-field.test.ts
          npx tsx src/tests/skill-ask-before-plan-grade-rule.test.ts
          npx tsx src/tests/collab-proactive-refresh-when-healthy.test.ts
          npx tsx src/tests/public-create-hydrates-collab-and-projection.test.ts
