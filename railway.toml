# Railway 部署配置
# 文档：https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Dockerfile 里已经用 tini 起 node，这里不覆盖 CMD
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# 挂载持久化 Volume（在 Railway Dashboard 创建后通过变量关联，挂到 /data）
# 需要设置的环境变量（Dashboard → Variables）：
#   PROOF_SHARE_MARKDOWN_AUTH_MODE=api_key
#   PROOF_SHARE_MARKDOWN_API_KEY=<随机 32 字符>
#   PROOF_LEGACY_CREATE_MODE=disabled
#   PROOF_COLLAB_SIGNING_SECRET=<随机 32 字符>
#   PROOF_PUBLIC_ORIGIN=https://<your-domain>
#   PROOF_PUBLIC_BASE_URL=https://<your-domain>  # 和 ORIGIN 同值；漏填 collab 会卡在 ws://localhost
#   ZOON_PUBLIC_CREATE_ENABLED=true
#   VITE_ANTHROPIC_API_KEY=<openrouter key>（可选，启用 AI 功能时）
#
# Railway 自动注入：PORT
# Dockerfile 已默认：DATABASE_PATH=/data/proof-share.db, SNAPSHOT_DIR=/data/snapshots
